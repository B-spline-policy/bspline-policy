name: yam-v1-bspline

shape_meta: &shape_meta
  obs:
    wrist_image:
      shape: [3, 84, 84]
      type: rgb
    arm_pos:
      shape: [3]
    arm_quat:
      shape: [4]
    gripper_pos:
      shape: [1]

  # Raw YAM action is 7D: arm_pos(3), arm_rotvec(3), gripper(1).
  # The loader converts it to arm_pos(3), arm_rot6d(6), gripper(1) = 10D.
  # The B-spline dataset emits (chunk_size + 2 * degree, 1 + 10).
  action:
    shape: [10]

dataset_path: &dataset_path ../diffusion_policy/data/yam-v1.hdf5
abs_action: &abs_action True

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: bspline_policy.dataset.robomimic_replay_bspline_image_dataset.RobomimicReplayBSplineImageDataset
  shape_meta: *shape_meta
  dataset_path: *dataset_path
  horizon: ${horizon}
  pad_before: 0
  pad_after: 0
  n_obs_steps: ${dataset_obs_steps}
  abs_action: *abs_action
  rotation_rep: 'rotation_6d'
  bspline_degree: 3
  chunk_size: ${eval:'${horizon}-2*${task.dataset.bspline_degree}'}
  max_error: 0.002
  stride: 1
  relative_knots: false
  use_cache: True
  cache_suffix: yam_v1_bspline_rot6d
  seed: 42
  val_ratio: 0.0
